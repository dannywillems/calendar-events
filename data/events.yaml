# Conference list. Each entry is one event.
#
# Required fields:
#   name   conference name
#   start  start date, YYYY-MM-DD
#
# Optional fields:
#   end       end date, YYYY-MM-DD (defaults to start for a single-day event)
#   location  free text, e.g. "Taipei, Taiwan"
#   country   geography facet, e.g. "Taiwan"
#   field     subject tags: a single tag or a list, e.g. [infosec, crypto]
#   kind      one of: academic | industry | business | community
#   status    one of: confirmed | tentative | interested
#   url       link to the event website
#   notes     free text

